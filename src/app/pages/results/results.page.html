<ion-header>
  <ion-toolbar>

    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home">
      </ion-back-button>
    </ion-buttons>

    <ion-title>
      Resultados
    </ion-title>

  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Dashboard -->

  <ion-grid class="stats-grid">

    <ion-row>

      <ion-col size="12" size-md="4">

        <ion-card class="stat-card">

          <ion-card-content>

            <div class="number">
              {{ totalUniversities }}
            </div>

            <div class="label">
              Universidades
            </div>

          </ion-card-content>

        </ion-card>

      </ion-col>

      <ion-col size="12" size-md="4">

        <ion-card class="stat-card">

          <ion-card-content>

            <div class="number">
              {{ totalDomains }}
            </div>

            <div class="label">
              Domínios
            </div>

          </ion-card-content>

        </ion-card>

      </ion-col>

      <ion-col size="12" size-md="4">

        <ion-card class="stat-card">

          <ion-card-content>

            <div class="number">
              {{ totalFavorites }}
            </div>

            <div class="label">
              Favoritos
            </div>

          </ion-card-content>

        </ion-card>

      </ion-col>

    </ion-row>

  </ion-grid>

  <!-- Busca local -->

  <ion-searchbar
    placeholder="Filtrar universidade..."
    [(ngModel)]="searchTerm"
    (ionInput)="filterUniversities()">

  </ion-searchbar>

  <!-- Ordenação -->

  <ion-segment
    value="asc"
    (ionChange)="sortUniversities($event.detail.value?.toString())">

    <ion-segment-button value="asc">

      <ion-label>
        A-Z
      </ion-label>

    </ion-segment-button>

    <ion-segment-button value="desc">

      <ion-label>
        Z-A
      </ion-label>

    </ion-segment-button>

  </ion-segment>

  <!-- Lista de universidades -->

  <ion-card
    *ngFor="let university of filteredUniversities"
    class="university-card">

    <ion-card-content>

      <div class="card-header">

        <div class="card-info">

          <h2>
            {{ university.name }}
          </h2>

          <p>
            {{ university.country }}
          </p>

          <a
            [href]="university.web_pages[0]"
            target="_blank">

            {{ university.web_pages[0] }}

          </a>

        </div>

        <ion-button
          fill="clear"
          color="warning"
          (click)="addFavorite(university)">

          <ion-icon
            name="star"
            slot="icon-only">
          </ion-icon>

        </ion-button>

      </div>

    </ion-card-content>

  </ion-card>

</ion-content>
