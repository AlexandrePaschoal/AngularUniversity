<ion-header>
  <ion-toolbar>
    <ion-title>
      {{ country }}
    </ion-title>
      <ion-item>
          <ion-input
            label="Filtrar universidade"
            labelPlacement="floating"
            [(ngModel)]="searchTerm"
            (ionInput)="filterUniversities()">
          </ion-input>
      </ion-item>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>

    <ion-item *ngFor="let university of filteredUniversities">

      <ion-label>
        <h2>{{ university.name }}</h2>

        <p>{{ university.country }}</p>

        <a
          [href]="university.web_pages[0]"
          target="_blank">
          {{ university.web_pages[0] }}
        </a>

      </ion-label>

      <ion-button
        slot="end"
        fill="clear"
        (click)="addFavorite(university)">
        ⭐
      </ion-button>

    </ion-item>

  </ion-list>

</ion-content>
