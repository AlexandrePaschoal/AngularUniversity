<ion-header>
  <ion-toolbar>
    <ion-title>
      Favoritos
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-list>

    <ion-item
      *ngFor="let university of favorites">

      <ion-label>

        <h2>
          {{ university.name }}
        </h2>

        <p>
          {{ university.country }}
        </p>

      </ion-label>

      <ion-button
        color="danger"
        slot="end"
        (click)="removeFavorite(university.name)">

        🗑️

      </ion-button>

    </ion-item>

  </ion-list>

</ion-content>
